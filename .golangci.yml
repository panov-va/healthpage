# Конфигурация golangci-lint для backend HealthPage.
run:
  timeout: 5m

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/healthpage/backend

issues:
  exclude-rules:
    # В тестах допускаем непроверенные ошибки на закрытии тел ответов и т.п.
    - path: _test\.go
      linters:
        - errcheck
