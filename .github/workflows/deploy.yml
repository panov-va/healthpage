name: Deploy

# Запускается ПОСЛЕ успешного workflow "CI" на ветке main (тесты/линт/сборка зелёные).
# Пуш в main → CI → (успех) → Deploy: собрать и запушить образы в GHCR, затем задеплоить на сервер.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Ручной повторный деплой (например, того же коммита) — вкладка Actions.
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    # Только если CI прошёл успешно (или ручной запуск).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: healthpage-backend
            context: ./backend
            file: ./backend/Dockerfile
          - image: healthpage-rabbitmq
            context: ./docker/rabbitmq
            file: ./docker/rabbitmq/Dockerfile
          - image: healthpage-public-ssr
            context: ./frontend/public-ssr
            file: ./frontend/public-ssr/Dockerfile
          # admin: контекст — корень репо (нужен shared/api-types для vite-alias @api-types).
          - image: healthpage-admin
            context: .
            file: ./frontend/admin/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          # Собираем ровно тот коммит, что прошёл CI (или HEAD при ручном запуске).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      # Копируем прод-compose и Caddyfile на сервер (секреты — в ./.env на сервере, не из git).
      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: ${{ secrets.DEPLOY_PATH }}
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: TAG,REGISTRY,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export TAG REGISTRY
            # Тянем свежие образы нужного тега.
            docker compose -f docker-compose.prod.yml pull
            # Применяем миграции ДО перезапуска api (аддитивные — безопасно на работающем стеке).
            docker compose -f docker-compose.prod.yml run --rm --entrypoint /app/migrate api up
            # Объявляем топологию RabbitMQ (идемпотентно) и поднимаем стек.
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml run --rm --entrypoint /app/queue-setup api || true
            docker image prune -f
