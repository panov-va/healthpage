# Конфигурация golangci-lint для backend HealthPage.
# golangci-lint v2 configuration.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive
  exclusions:
    rules:
      # В тестах допускаем непроверенные ошибки на закрытии тел ответов и т.п.
      - path: _test\.go
        linters:
          - errcheck
      # revive-правила godoc-стиля (обязательный комментарий на каждый экспортируемый
      # идентификатор / package-comment) не даём как обязательные: проект придерживается
      # правила "комментарий только когда WHY не очевиден" (CLAUDE.md), а не Go-doc-конвенции
      # для публичных библиотек. Остальные revive-проверки (error-strings, empty-block,
      # context-as-argument и т.п.) остаются включёнными.
      - linters:
          - revive
        text: '^(exported|package-comments):'

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/healthpage/backend
