name: Deploy

# Запускается ПОСЛЕ успешного workflow "CI" на ветке main (тесты/линт/сборка зелёные).
# Пуш в main → CI → (успех) → build+push образов в GHCR → триггер передеплоя в Dokploy (вебхуки).
# Сборка образов — здесь; выкатку и БД ведёт Dokploy на сервере (см. DEPLOY.md).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Ручной повторный деплой (например, того же коммита) — вкладка Actions.
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    # Только если CI прошёл успешно (или ручной запуск).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: healthpage-backend
            context: ./backend
            file: ./backend/Dockerfile
          - image: healthpage-rabbitmq
            context: ./docker/rabbitmq
            file: ./docker/rabbitmq/Dockerfile
          - image: healthpage-public-ssr
            context: ./frontend/public-ssr
            file: ./frontend/public-ssr/Dockerfile
          # admin: контекст — корень репо (нужен shared/api-types для vite-alias @api-types).
          - image: healthpage-admin
            context: .
            file: ./frontend/admin/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          # Собираем ровно тот коммит, что прошёл CI (или HEAD при ручном запуске).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Триггерим передеплой в Dokploy: образы уже в GHCR, Dokploy тянет :latest по вебхуку.
  # Секрет DOKPLOY_WEBHOOKS — список URL-вебхуков приложений (по одному на строку или через пробел):
  # api и все воркеры используют образ healthpage-backend, поэтому у каждого свой вебхук.
  # migrate up вынесен в Pre-Deploy команду api-приложения в самом Dokploy (см. DEPLOY.md).
  trigger-dokploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploys
        env:
          WEBHOOKS: ${{ secrets.DOKPLOY_WEBHOOKS }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOKS:-}" ]; then
            echo "DOKPLOY_WEBHOOKS не задан — пропуск (настройте вебхуки приложений в Dokploy)."
            exit 0
          fi
          for url in $WEBHOOKS; do
            echo "→ deploy: ${url%%\?*}"
            curl -fsS -X POST "$url" && echo " ok" || echo " FAILED"
          done
