# nginx для admin-SPA: раздаёт статику, SPA-fallback на index.html (client-side routing).
# /api сюда НЕ проксируется — это делает внешний ingress (Caddy) на уровне домена app.*.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Кэш статики с хэшами в имени — надолго.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: любой маршрут → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
