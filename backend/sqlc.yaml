version: "2"
sql:
  - engine: "postgresql"
    # Схема берётся из goose-миграций (sqlc понимает аннотации goose и применяет только Up).
    schema: "migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          # nullable text -> *string (чтобы status_pages чисто лёг на доменные *string)
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
