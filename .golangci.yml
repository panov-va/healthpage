# Конфигурация golangci-lint для backend HealthPage.
# golangci-lint v2 configuration.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/healthpage/backend

issues:
  exclude-rules:
    # В тестах допускаем непроверенные ошибки на закрытии тел ответов и т.п.
    - path: _test\.go
      linters:
        - errcheck
